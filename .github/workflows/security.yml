name: Security

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Scan for exposed secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan tracked files
        shell: bash
        run: |
          set -euo pipefail

          matches="$(git grep -n -I -E \
            -e 'AKIA[0-9A-Z]{16}' \
            -e 'ASIA[0-9A-Z]{16}' \
            -e 'ghp_[A-Za-z0-9]{36}' \
            -e 'github_pat_[A-Za-z0-9_]{82}' \
            -e 'AIza[0-9A-Za-z_-]{35}' \
            -e 'xox[baprs]-[A-Za-z0-9-]+' \
            -e '-----BEGIN (RSA|OPENSSH|EC|PRIVATE) KEY-----' \
            -- . ':(exclude).github/workflows/*' || true)"

          if [ -n "$matches" ]; then
            printf '%s\n' "$matches"
            exit 1
          fi
