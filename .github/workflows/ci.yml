name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/painel_lojista
      SHADOW_DATABASE_URL: mysql://ci:ci@127.0.0.1:3306/prisma_migrate_shadow_db
    defaults:
      run:
        working-directory: back-painel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: back-painel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build backend
        run: npm run build

      - name: Run backend tests
        run: npm run test:run

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front-painel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front-painel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build frontend
        run: npm run build
